<div class="form-container">
    <h3>Formulario de Consulta Académica</h3>
    <p>¿Tienes dudas sobre los modelos biológicos? Contáctanos:</p>
    
    <form action="#">
        <div class="group">
            <label for="nombre">Nombre completo:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre..." required>
        </div>

        <div class="group">
            <label for="email">Correo electrónico:</label>
            <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
        </div>

        <div class="group">
            <label for="interes">Área de interés:</label>
            <select id="interes" name="interes">
                <option value="botanica">Botánica (Filotaxis)</option>
                <option value="zoologia">Zoología (Crecimiento)</option>
                <option value="mates">Matemática Pura</option>
            </select>
        </div>

        <div class="group">
            <label for="mensaje">Comentarios o Dudas:</label>
            <textarea id="mensaje" name="mensaje" rows="4" placeholder="Escribe aquí tu consulta sobre Fibonacci..."></textarea>
        </div>

        <button type="submit">Enviar Información</button>
    </form>
</div>
